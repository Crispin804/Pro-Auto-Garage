<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Pro Auto Care Garage</title>
</head>
<body>
    <!-- GLOBAL NAVIGATION BAR -->
<nav class="global-navigation-bar bg-[#0B132B] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <!-- Logo and Brand Alignment -->
        <div class="flex items-center space-x-3">
            <a href="#hero-section" class="flex items-center space-x-3 hover:opacity-90 transition" title="Go to Home">
                <i data-lucide="wrench" class="w-8 h-8 text-[#F97316] transform rotate-90"></i>
            </a>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Pro Auto Care</h1>
                <p class="text-xs text-gray-400 font-normal">Your Trusted Garage Partner</p>
            </div>
        </div>
        
        <!-- External Navigation links requested for later development -->
        <div class="hidden md:flex items-center space-x-8 text-sm font-medium tracking-wide">
            <a href="#hero-section" class="hover:text-[#F97316] transition text-gray-300">Home</a>
            <a href="services.html" class="hover:text-[#F97316] transition text-gray-300">Services</a>
            <a href="about.html" class="hover:text-[#F97316] transition text-gray-300">About Us</a>
            <a href="gallery.html" class="hover:text-[#F97316] transition text-gray-300">Gallery</a>
            <a href="contact.html" class="hover:text-[#F97316] transition text-gray-300">Contact</a>
        </div>

        <!-- Call to Action Emergency Component -->
        <div>
            <a href="tel:1234567890" class="bg-[#F97316] hover:bg-[#e2620d] transition text-white px-5 py-2.5 rounded-lg flex items-center space-x-2 font-bold text-sm tracking-wide">
                <i data-lucide="phone" class="w-4 h-4 fill-current"></i>
                <span>24/7 Emergency</span>
            </a>
        </div>
    </div>
</nav>
<!-- HERO SHOWCASE SECTION -->
<header id="hero-section" class="hero-showcase-section relative bg-cover bg-center bg-no-repeat flex items-center justify-center px-6 py-28 text-center text-white" 
        style="background-image: linear-gradient(rgba(11, 19, 43, 0.82), rgba(11, 19, 43, 0.82)), url('Assets/Images/download (1).jpg');">
    <div class="max-w-5xl mx-auto space-y-6">
        <h2 class="text-4xl sm:text-6xl font-black tracking-tight leading-none">
            Professional Auto Care Services
        </h2>
        <p class="text-base sm:text-lg text-gray-300 max-w-3xl mx-auto font-normal tracking-wide">
            Bodyworks, Mechanical Repairs, Wheel Alignment & Emergency Towing
        </p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-6">
            <a href="#booking-section" class="w-full sm:w-auto bg-[#F97316] hover:bg-[#e2620d] text-white px-8 py-3.5 rounded-lg font-bold text-sm transition tracking-wider">
                Book Service
            </a>
            <a href="#services-section" class="w-full sm:w-auto bg-white text-[#0B132B] hover:bg-gray-100 px-8 py-3.5 rounded-lg font-bold text-sm transition tracking-wider">
                Our Services
            </a>
        </div>
    </div>
</header>

   <script>
        lucide.createIcons();
    </script> 
</body>
</html>
